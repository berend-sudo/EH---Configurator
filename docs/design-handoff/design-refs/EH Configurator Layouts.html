<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>EH Configurator — Layout Exploration</title>
<link rel="stylesheet" href="design-system/colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: var(--eh-font-sans); color: var(--eh-text); background: #f0eee9; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }

  /* helpers used inside artboards */
  .ab-pill { display:inline-flex; align-items:center; gap:8px; padding:6px 14px; border-radius:999px;
             font-size:12px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; }
  .ab-pill-green { background: var(--eh-green); color: var(--eh-green-900); }
  .ab-pill-outline { background:transparent; color: var(--eh-green-900); border: 1.5px solid var(--eh-green-900); }
  .ab-pill-deep { background: var(--eh-green-900); color:#fff; }
  .ab-pill-soft { background: var(--eh-green-100); color: var(--eh-green-800); }

  .ab-cta { display:inline-flex; align-items:center; gap:10px; padding:14px 28px;
            border-radius:999px; background: var(--eh-green); color: var(--eh-green-900);
            font-weight:600; font-size:15px; border:0; cursor:pointer;
            transition: background .22s var(--eh-ease), transform .12s var(--eh-ease); }
  .ab-cta:hover { background: var(--eh-green-500); }
  .ab-cta--dark { background: var(--eh-green-900); color: #fff; }
  .ab-cta--dark:hover { background: var(--eh-green-950); }
  .ab-cta--ghost { background:transparent; color: var(--eh-green-900); border:1.5px solid var(--eh-green-900); }

  /* segmented control */
  .seg { display:inline-flex; padding:4px; gap:4px; border:1px solid var(--eh-stroke-strong);
         border-radius:999px; background:#fff; }
  .seg button { border:0; background:transparent; padding:10px 18px; border-radius:999px;
                font-size:14px; font-weight:500; color: var(--eh-text); cursor:pointer; }
  .seg button.is-active { background: var(--eh-green-900); color:#fff; }

  /* input chip */
  .input-chip { display:flex; align-items:center; gap:10px; background:#fff;
                border:1px solid var(--eh-stroke); border-radius:14px; padding:14px 18px; }
  .input-chip label { font-size:11px; font-weight:600; color: var(--eh-text-muted);
                      letter-spacing:0.08em; text-transform:uppercase; display:block; }
  .input-chip .val { font-size:18px; font-weight:600; color: var(--eh-text); }

  /* slider rail */
  .rail { position:relative; height:6px; background: var(--eh-stroke); border-radius:999px; }
  .rail__fill { position:absolute; left:0; top:0; bottom:0; background: var(--eh-green-900); border-radius:999px; }
  .rail__knob { position:absolute; top:50%; width:22px; height:22px; transform:translate(-50%,-50%);
                background: var(--eh-green); border-radius:50%;
                box-shadow: 0 0 0 6px rgba(77,204,122,0.20), 0 2px 6px rgba(0,59,43,0.18); }

  /* mini stepper */
  .stepper { display:flex; align-items:center; gap:10px; }
  .stepper .dot { width:10px; height:10px; border-radius:50%; background: var(--eh-stroke-strong); }
  .stepper .dot.is-on { background: var(--eh-green-900); }
  .stepper .dot.is-current { background: var(--eh-green); box-shadow: 0 0 0 6px rgba(77,204,122,.22); }
  .stepper .bar { width:36px; height:1.5px; background: var(--eh-stroke-strong); }
  .stepper .bar.is-on { background: var(--eh-green-900); }

  /* form field */
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
                 color: var(--eh-text-muted); }
  .field input, .field select {
    appearance:none; border:1px solid var(--eh-stroke-strong); border-radius:12px;
    padding:14px 16px; font-family: inherit; font-size:15px; color: var(--eh-text);
    background:#fff; outline:none; transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus, .field select:focus { border-color: var(--eh-green-500);
    box-shadow: 0 0 0 4px rgba(77,204,122,.18); }

  /* placeholder photo */
  .photo {
    background-color: var(--eh-sand);
    background-image:
      linear-gradient(135deg, rgba(0,59,43,.08) 0%, rgba(0,59,43,0) 60%),
      radial-gradient(circle at 30% 70%, rgba(140,94,54,.22), transparent 55%),
      radial-gradient(circle at 75% 30%, rgba(77,204,122,.18), transparent 55%);
    position:relative; overflow:hidden;
  }
  .photo::after {
    content:""; position:absolute; inset:0;
    background:
      linear-gradient(180deg, transparent 55%, rgba(0,59,43,.18)),
      repeating-linear-gradient(45deg, rgba(0,59,43,.04) 0 6px, transparent 6px 12px);
    pointer-events:none;
  }
  .photo__label { position:absolute; left:12px; bottom:10px; z-index:1;
    font-size:10px; letter-spacing:.12em; text-transform:uppercase;
    color: rgba(255,255,255,.85); font-weight:600; }

  /* PDF page chrome */
  .pdf-page {
    background:#fff;
    box-shadow: 0 12px 40px rgba(0,59,43,0.18), 0 2px 6px rgba(0,59,43,0.06);
    position:relative; overflow:hidden;
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel" src="design-canvas.jsx"></script>

</html>
